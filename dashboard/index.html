<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspberry Pi IoT Dashboard</title>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f1923; color:#e0e0e0; }
header { background:#1a2634; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2a3a4a; }
header h1 { font-size:18px; font-weight:600; }
.conn-status { display:flex; align-items:center; gap:8px; font-size:13px; }
.conn-dot { width:10px; height:10px; border-radius:50%; background:#f44; transition:background 0.3s; }
.conn-dot.on { background:#4caf50; }

.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; padding:16px; max-width:1400px; margin:0 auto; }
.section h2 { font-size:14px; text-transform:uppercase; letter-spacing:1px; color:#6a8a9a; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid #2a3a4a; }

.card { background:#1a2634; border-radius:8px; padding:14px; margin-bottom:10px; border:1px solid #2a3a4a; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.card-name { font-size:13px; font-weight:600; color:#8ab4d0; }
.card-category { font-size:11px; color:#5a7a8a; }

.indicator { width:32px; height:32px; border-radius:50%; border:2px solid #3a4a5a; margin:0 auto 10px; transition:all 0.3s; }
.indicator.off { background:#2a3a4a; }
.indicator.on-red { background:#f44336; box-shadow:0 0 12px #f44336; }
.indicator.on-green { background:#4caf50; box-shadow:0 0 12px #4caf50; }
.indicator.on-blue { background:#2196f3; box-shadow:0 0 12px #2196f3; }
.indicator.on-yellow { background:#ffeb3b; box-shadow:0 0 12px #ffeb3b; }

.value-display { text-align:center; font-size:20px; font-weight:700; color:#fff; margin:8px 0; }
.value-unit { font-size:12px; color:#6a8a9a; font-weight:400; }

.controls { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.btn { padding:4px 10px; font-size:11px; border:1px solid #3a5a6a; border-radius:4px; background:#1e2e3e; color:#8ab4d0; cursor:pointer; transition:all 0.2s; }
.btn:hover { background:#2a4a5a; border-color:#4a7a9a; }
.btn.active { background:#2a5a4a; border-color:#4caf50; color:#4caf50; }

input[type=range] { width:100%; margin:6px 0; accent-color:#4caf50; }

.sensor-value { display:flex; justify-content:space-between; align-items:baseline; }
.chart-container { height:80px; margin-top:8px; }

.state-label { text-align:center; font-size:11px; color:#6a8a9a; margin-top:4px; }

@media(max-width:900px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <h1>Raspberry Pi IoT Dashboard</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">Disconnected</span>
  </div>
</header>

<div class="grid">
  <!-- Outputs -->
  <div class="section" id="outputs">
    <h2>Outputs</h2>
    <!-- cards generated by JS -->
  </div>
  <!-- Inputs -->
  <div class="section" id="inputs">
    <h2>Inputs</h2>
  </div>
  <!-- Sensors -->
  <div class="section" id="sensors">
    <h2>Sensors</h2>
  </div>
</div>

<script>
// ========================================
// Configuration
// ========================================
const MQTT_URL = 'ws://localhost:9001';
const TOPIC_STATE = 'iot/devices/+/state';
const TOPIC_CMD = 'iot/devices/{}/command';

// ========================================
// Device definitions for card rendering
// ========================================
const DEVICE_DEFS = {
  led_red:      { section:'outputs', label:'LED Red',     type:'led',    color:'red' },
  led_pwm:      { section:'outputs', label:'PWM LED',     type:'pwm' },
  led_rgb:      { section:'outputs', label:'RGB LED',     type:'rgb' },
  buzzer:       { section:'outputs', label:'Buzzer',      type:'buzzer' },
  servo:        { section:'outputs', label:'Servo',       type:'servo' },
  motor:        { section:'outputs', label:'DC Motor',    type:'motor' },
  button:       { section:'inputs',  label:'Button',      type:'button_input' },
  motion_sensor:{ section:'inputs',  label:'Motion (PIR)',type:'motion' },
  line_sensor:  { section:'inputs',  label:'Line Sensor', type:'line' },
  dht22_temperature: { section:'sensors', label:'Temperature', type:'sensor', unit:'°C', color:'#f44336' },
  dht22_humidity:    { section:'sensors', label:'Humidity',    type:'sensor', unit:'%',  color:'#2196f3' },
  bmp280_pressure:   { section:'sensors', label:'Pressure',   type:'sensor', unit:'hPa',color:'#9c27b0' },
  bh1750_light:      { section:'sensors', label:'Light',      type:'sensor', unit:'lux',color:'#ff9800' },
  hcsr04_distance:   { section:'sensors', label:'Distance',   type:'sensor', unit:'cm', color:'#4caf50' },
  soil_moisture:     { section:'sensors', label:'Soil Moisture',type:'sensor',unit:'%', color:'#795548' },
};

// State store
const deviceStates = {};
const sensorHistory = {};
const charts = {};
const MAX_HISTORY = 60;

// ========================================
// MQTT Connection
// ========================================
let client;
function connectMQTT() {
  client = mqtt.connect(MQTT_URL, { reconnectPeriod: 3000 });

  client.on('connect', () => {
    document.getElementById('connDot').classList.add('on');
    document.getElementById('connText').textContent = 'Connected';
    client.subscribe(TOPIC_STATE);
  });

  client.on('close', () => {
    document.getElementById('connDot').classList.remove('on');
    document.getElementById('connText').textContent = 'Disconnected';
  });

  client.on('message', (topic, msg) => {
    try {
      const name = topic.split('/')[2];
      const data = JSON.parse(msg.toString());
      deviceStates[name] = data;

      if (data.type === 'sensor' && data.value !== undefined) {
        if (!sensorHistory[name]) sensorHistory[name] = [];
        sensorHistory[name].push({ time: Date.now(), value: data.value });
        if (sensorHistory[name].length > MAX_HISTORY) sensorHistory[name].shift();
      }

      updateCard(name, data);
    } catch(e) { /* ignore parse errors */ }
  });
}

function sendCommand(device, action, value) {
  if (!client || !client.connected) return;
  const payload = value !== undefined
    ? JSON.stringify({ action, value: String(value) })
    : JSON.stringify({ action });
  client.publish(TOPIC_CMD.replace('{}', device), payload);
}

// ========================================
// Card Creation
// ========================================
function createCards() {
  for (const [name, def] of Object.entries(DEVICE_DEFS)) {
    const section = document.getElementById(def.section);
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${name}`;
    card.innerHTML = buildCardHTML(name, def);
    section.appendChild(card);

    if (def.type === 'sensor') {
      createChart(name, def);
    }
  }
}

function buildCardHTML(name, def) {
  const header = `<div class="card-header"><span class="card-name">${def.label}</span><span class="card-category">${name}</span></div>`;

  switch(def.type) {
    case 'led':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="state-label" id="state-${name}">OFF</div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','on')">ON</button>
          <button class="btn" onclick="sendCommand('${name}','off')">OFF</button>
          <button class="btn" onclick="sendCommand('${name}','toggle')">Toggle</button>
        </div>`;

    case 'pwm':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="value-display" id="val-${name}">0.0</div>` +
        `<input type="range" min="0" max="100" value="0" oninput="sendCommand('${name}','set',this.value/100)">` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','on')">ON</button>
          <button class="btn" onclick="sendCommand('${name}','off')">OFF</button>
          <button class="btn" onclick="sendCommand('${name}','pulse')">Pulse</button>
        </div>`;

    case 'rgb':
      return header +
        `<div class="indicator off" id="ind-${name}" style="width:48px;height:48px;"></div>` +
        `<div class="state-label" id="state-${name}">R:0 G:0 B:0</div>` +
        `<div style="display:flex;gap:4px;margin-top:8px;">
          <input type="range" min="0" max="100" value="0" id="rgb-r-${name}" style="accent-color:#f44" oninput="sendRGB('${name}')">
          <input type="range" min="0" max="100" value="0" id="rgb-g-${name}" style="accent-color:#4f4" oninput="sendRGB('${name}')">
          <input type="range" min="0" max="100" value="0" id="rgb-b-${name}" style="accent-color:#44f" oninput="sendRGB('${name}')">
        </div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','on')">ON</button>
          <button class="btn" onclick="sendCommand('${name}','off')">OFF</button>
        </div>`;

    case 'buzzer':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="state-label" id="state-${name}">OFF</div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','on')">ON</button>
          <button class="btn" onclick="sendCommand('${name}','off')">OFF</button>
          <button class="btn" onclick="sendCommand('${name}','beep')">Beep</button>
        </div>`;

    case 'servo':
      return header +
        `<div class="value-display" id="val-${name}">0.0</div>` +
        `<input type="range" min="-100" max="100" value="0" oninput="sendCommand('${name}','set',this.value/100)">` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','min')">Min</button>
          <button class="btn" onclick="sendCommand('${name}','mid')">Mid</button>
          <button class="btn" onclick="sendCommand('${name}','max')">Max</button>
        </div>`;

    case 'motor':
      return header +
        `<div class="value-display" id="val-${name}">0.0</div>` +
        `<div style="height:8px;background:#2a3a4a;border-radius:4px;overflow:hidden;margin:4px 0;">
          <div id="bar-${name}" style="height:100%;width:50%;background:#4caf50;transition:all 0.3s;margin-left:50%;"></div>
        </div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','forward')">Forward</button>
          <button class="btn" onclick="sendCommand('${name}','stop')">Stop</button>
          <button class="btn" onclick="sendCommand('${name}','backward')">Backward</button>
        </div>`;

    case 'button_input':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="state-label" id="state-${name}">Released</div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','press')">Press</button>
          <button class="btn" onclick="sendCommand('${name}','release')">Release</button>
        </div>`;

    case 'motion':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="state-label" id="state-${name}">No Motion</div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','trigger')">Trigger</button>
          <button class="btn" onclick="sendCommand('${name}','clear')">Clear</button>
        </div>`;

    case 'line':
      return header +
        `<div class="indicator off" id="ind-${name}"></div>` +
        `<div class="state-label" id="state-${name}">No Line</div>` +
        `<div class="controls">
          <button class="btn" onclick="sendCommand('${name}','detect')">Detect</button>
          <button class="btn" onclick="sendCommand('${name}','clear')">Clear</button>
        </div>`;

    case 'sensor':
      return header +
        `<div class="sensor-value">
          <div class="value-display" id="val-${name}">--</div>
          <span class="value-unit">${def.unit}</span>
        </div>` +
        `<div class="chart-container"><canvas id="chart-${name}"></canvas></div>`;

    default:
      return header + '<div>Unknown device type</div>';
  }
}

function sendRGB(name) {
  const r = document.getElementById(`rgb-r-${name}`).value / 100;
  const g = document.getElementById(`rgb-g-${name}`).value / 100;
  const b = document.getElementById(`rgb-b-${name}`).value / 100;
  sendCommand(name, 'set', `${r},${g},${b}`);
}

// ========================================
// Chart Creation
// ========================================
function createChart(name, def) {
  const ctx = document.getElementById(`chart-${name}`).getContext('2d');
  charts[name] = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: def.color || '#4caf50', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { ticks: { font: { size: 9 }, color: '#6a8a9a' }, grid: { color: '#1e2e3e' } }
      },
      animation: false,
    }
  });
}

// ========================================
// Card Updates
// ========================================
function updateCard(name, data) {
  const def = DEVICE_DEFS[name];
  if (!def) return;

  switch(def.type) {
    case 'led': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      if (data.on) { ind.className = 'indicator on-red'; label.textContent = 'ON'; }
      else { ind.className = 'indicator off'; label.textContent = 'OFF'; }
      break;
    }
    case 'pwm': {
      const ind = document.getElementById(`ind-${name}`);
      const val = document.getElementById(`val-${name}`);
      const v = data.value || 0;
      val.textContent = v.toFixed(2);
      if (v > 0) {
        ind.className = 'indicator on-green';
        ind.style.opacity = 0.3 + v * 0.7;
      } else {
        ind.className = 'indicator off';
        ind.style.opacity = 1;
      }
      break;
    }
    case 'rgb': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      const c = data.color || [0,0,0];
      const r = Math.round(c[0]*255), g = Math.round(c[1]*255), b = Math.round(c[2]*255);
      if (r+g+b > 0) {
        ind.style.background = `rgb(${r},${g},${b})`;
        ind.style.boxShadow = `0 0 16px rgb(${r},${g},${b})`;
        ind.style.border = 'none';
      } else {
        ind.style.background = '#2a3a4a';
        ind.style.boxShadow = 'none';
        ind.style.border = '2px solid #3a4a5a';
      }
      label.textContent = `R:${c[0].toFixed(1)} G:${c[1].toFixed(1)} B:${c[2].toFixed(1)}`;
      break;
    }
    case 'buzzer': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      if (data.on) { ind.className = 'indicator on-yellow'; label.textContent = 'ON'; }
      else { ind.className = 'indicator off'; label.textContent = 'OFF'; }
      break;
    }
    case 'servo': {
      const val = document.getElementById(`val-${name}`);
      val.textContent = (data.value !== undefined ? data.value : 0).toFixed(2);
      break;
    }
    case 'motor': {
      const val = document.getElementById(`val-${name}`);
      const bar = document.getElementById(`bar-${name}`);
      const speed = data.speed || 0;
      val.textContent = speed.toFixed(2);
      if (speed >= 0) {
        bar.style.marginLeft = '50%';
        bar.style.width = (speed * 50) + '%';
        bar.style.background = '#4caf50';
      } else {
        const w = Math.abs(speed) * 50;
        bar.style.marginLeft = (50 - w) + '%';
        bar.style.width = w + '%';
        bar.style.background = '#f44336';
      }
      break;
    }
    case 'button_input': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      if (data.pressed) { ind.className = 'indicator on-green'; label.textContent = 'Pressed'; }
      else { ind.className = 'indicator off'; label.textContent = 'Released'; }
      break;
    }
    case 'motion': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      if (data.motion_detected) { ind.className = 'indicator on-red'; label.textContent = 'Motion!'; }
      else { ind.className = 'indicator off'; label.textContent = 'No Motion'; }
      break;
    }
    case 'line': {
      const ind = document.getElementById(`ind-${name}`);
      const label = document.getElementById(`state-${name}`);
      if (data.line_detected) { ind.className = 'indicator on-blue'; label.textContent = 'Line!'; }
      else { ind.className = 'indicator off'; label.textContent = 'No Line'; }
      break;
    }
    case 'sensor': {
      const val = document.getElementById(`val-${name}`);
      val.textContent = (data.value !== undefined) ? data.value.toFixed(1) : '--';

      if (charts[name] && sensorHistory[name]) {
        const hist = sensorHistory[name];
        charts[name].data.labels = hist.map((h,i) => i);
        charts[name].data.datasets[0].data = hist.map(h => h.value);
        charts[name].update();
      }
      break;
    }
  }
}

// ========================================
// Init
// ========================================
createCards();
connectMQTT();
</script>
</body>
</html>
