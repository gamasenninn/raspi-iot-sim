services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  raspi:
    image: ptrsr/pi-ci
    container_name: raspi
    command: start
    stdin_open: true
    tty: true
    ports:
      - "2222:2222"
    volumes:
      - ./dist:/dist
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - iot-net

volumes:
  mosquitto_data:
  mosquitto_log:

networks:
  iot-net:
    driver: bridge
